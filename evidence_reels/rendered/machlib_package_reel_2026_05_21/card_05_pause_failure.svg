<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Pause / failure</title>
  <desc id="desc">MachLib upload retry boundary. Pre-alpha evidence tooling - not a theorem/proof/safety claim.</desc>
  <rect width="1280" height="720" fill="#f7f4ed"/>
  <rect x="0" y="0" width="1280" height="18" fill="#a43845"/>
  <rect x="64" y="72" width="1152" height="552" rx="0" fill="#ffffff" stroke="#d7d1c5" stroke-width="2"/>
  <text x="92" y="124" font-size="22" font-weight="700" fill="#a43845">MACHLIB EVIDENCE REEL / CARD 05</text>
  <text x="92" y="194" font-size="54" font-weight="700" fill="#191919">Pause / failure</text>
  <text x="96" y="292" font-size="28" font-weight="500" fill="#4b4b4b">MachLib upload retry boundary</text>
  <line x1="96" y1="330" x2="1184" y2="330" stroke="#e3ded3" stroke-width="2"/>
  <text x="122" y="390" font-size="30" font-weight="500" fill="#202020">- PyPI HTTP 429 for MachLib</text>
<text x="122" y="434" font-size="30" font-weight="500" fill="#202020">- no immediate retry</text>
<text x="122" y="478" font-size="30" font-weight="500" fill="#202020">- retry after cooldown</text>
  <rect x="64" y="650" width="1152" height="42" fill="#252525"/>
  <text x="92" y="678" font-size="21" font-weight="600" fill="#ffffff">Pre-alpha evidence tooling &#8212; not a theorem/proof/safety claim.</text>
</svg>
